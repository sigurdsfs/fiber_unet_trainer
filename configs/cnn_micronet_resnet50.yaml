data:
  images_dir: "C:/Users/lababr/Desktop/Current Training Material - fibers only"
  masks_dir: "C:/Users/lababr/Desktop/Current Training Material - fibers only"
  image_glob: "*.tif"
  mask_pattern: "{stem}_mask.tif"

  patch_size: 512
  stride: 256
  batch_size: 14
  num_workers: 8
  seed: 42

  image_channels: 3

  split:
    train: 0.7
    val: 0.15
    test: 0.15

  min_foreground_fraction: 0.00005
  keep_empty_probability: 0.2

model:
  architecture: "Unet"
  encoder_name: "resnet50"
  encoder_weights: "micronet"
  in_channels: 3
  classes: 1

logging:
  log_prediction_images: true
  prediction_max_images: 20
  prediction_artifact_dir: "predictions"

train:
  max_epochs: 100
  learning_rate: 0.0002
  weight_decay: 0.0001
  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"
  threshold: 0.5

  loss:
    name: "bce_focal_tversky"
    tversky_alpha: 0.3
    tversky_beta: 0.7
    focal_gamma: 0.75

  # Pretrained micronet encoder fine-tunes at 1/10th of the decoder's LR
  # (0.0002 * 0.1 = 0.00002) so pretrained features aren't overwritten early.
  encoder_lr_ratio: 0.1

  scheduler:
    name: "reduce_on_plateau"
    patience: 5
    factor: 0.5
    # min_lr is a single floor shared by both param groups (encoder and
    # decoder), so it's sized relative to the *smaller* one: roughly
    # encoder_lr / 10 = (0.0002 * 0.1) / 10 = 0.000002. This leaves the
    # encoder ~3-4 halvings of headroom before it's floored, and the
    # decoder correspondingly more.
    min_lr: 0.000002
  matmul_precision: "medium"

  log_every_n_steps: 1
  val_check_interval: 1.0
  deterministic: false

mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "MicroNet_fiber_segmentation"
  run_name: "Unet_resnet50_micronet_3ch_rawlogits_bs14_lr2e-4"

augmentations:
  train:
    - name: D4
      p: 0.75

    - name: RandomBrightnessContrast
      brightness_limit: 0.25
      contrast_limit: 0.25
      p: 0.5

    - name: GaussNoise
      std_range: [0.02, 0.08]
      p: 0.15

    - name: GaussianBlur
      blur_limit: [3, 3]
      p: 0.08

    - name: MotionBlur
      blur_limit: [3, 7]
      p: 0.10

  val: []
  test: []